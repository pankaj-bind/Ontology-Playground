name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Compile catalogue
        run: npm run catalogue:build

      - name: Compile learning content (sanitized)
        run: npm run learn:build

      - name: Validate RDF files
        run: npm run validate

      - name: Type check
        run: npx tsc -b

      - name: Run tests
        run: npm test

      - name: Build
        run: npx vite build
